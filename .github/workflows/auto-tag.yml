name: Auto-tag on merge to main

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

concurrency:
  group: auto-tag-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep 'version = ' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Found version: $VERSION"

      - name: Create and push tag
        run: |
          git config user.name "local-home-devices-mcp-bot"
          git config user.email "bot@local-home-devices-mcp.local"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Trigger downstream publish
        run: |
          gh workflow run "Create and publish a Docker image" \
            --ref "v${{ steps.version.outputs.version }}" \
            || echo "::warning::Publish workflow trigger failed or workflow not found"
        env:
          GH_TOKEN: ${{ github.token }}
