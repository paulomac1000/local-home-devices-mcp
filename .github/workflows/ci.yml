name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install linting tools
        run: pip install ruff mypy bandit

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy tools/ --strict

      - name: bandit
        run: bandit -r tools/ -ll

      - name: Validate documentation (CAFDS)
        if: hashFiles('afds_config.yaml') != ''
        run: |
          curl -sS https://raw.githubusercontent.com/paulomac1000/ai-skills/main/skills/afds-doc-writer/docs_validate.py | python3 - \
            --config afds_config.yaml --strict --baseline .afds-baseline.json ./

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mosquitto:
        image: eclipse-mosquitto:latest
        ports:
          - 1883:1883
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=tools \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Run integration tests
        env:
          MQTT_BROKER: localhost
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq nmap
          pytest tests/integration/ -v --tb=short

      - name: Upload coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-smoke:
    runs-on: ubuntu-latest
    needs: test
    services:
      mosquitto:
        image: eclipse-mosquitto:latest
        ports:
          - 1883:1883
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: tasmota-openbk-mcp:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — tool count
        run: |
          docker run --rm tasmota-openbk-mcp:test python3 -c "
          from server import get_tool_count
          tc = get_tool_count()
          assert tc == 14, f'Expected 14 tools, got {tc}'
          print('Tool count OK:', tc)
          "

      - name: Smoke test — REST API health + tools
        run: |
          docker run -d --rm --network host \
            -e MQTT_BROKER=localhost \
            --name mcp-smoke tasmota-openbk-mcp:test
          sleep 5
          curl -fsS --retry 10 --retry-delay 2 \
            http://localhost:9100/health || exit 1
          TOOLS=$(curl -s http://localhost:9102/api/tools \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total'])")
          [ "$TOOLS" = "14" ] \
            || (echo "FAIL: expected 14 tools, got $TOOLS" && exit 1)
          echo "REST API smoke test OK ($TOOLS tools)"
          docker stop mcp-smoke
