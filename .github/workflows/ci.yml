name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install dependencies and linting tools
        run: |
          python -m pip install --upgrade pip --break-system-packages
          pip install --break-system-packages -e ".[dev,mqtt,tuya]"
          pip install --break-system-packages ruff mypy bandit

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy tools/ --strict --no-warn-unused-ignores

      - name: bandit
        run: bandit -r tools/ -ll

      - name: Validate documentation (CAFDS)
        if: hashFiles('afds_config.yaml') != ''
        run: |
          curl -sS https://raw.githubusercontent.com/paulomac1000/ai-skills/main/skills/afds-doc-writer/docs_validate.py | python3 - \
            --config afds_config.yaml --strict --baseline .afds-baseline.json ./

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mosquitto:
        image: eclipse-mosquitto:latest
        ports:
          - 1883:1883
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          pip install --break-system-packages -e ".[dev,mqtt,tuya]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=tools \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Run integration tests
        env:
          MQTT_BROKER: localhost
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq nmap
          pytest tests/integration/ -v --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-smoke:
    runs-on: ubuntu-latest
    needs: test
    services:
      mosquitto:
        image: eclipse-mosquitto:latest
        ports:
          - 1883:1883
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          load: true
          tags: local-home-devices-mcp:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test - tool count
        run: |
          docker run --rm local-home-devices-mcp:test python3 -c "
          from tools.constants import TOOL_MANIFESTS, DOCKER_TOOL_NAMES
          from server import get_tool_count
          full_count = len(TOOL_MANIFESTS)
          tc = get_tool_count()
          # Docker tools are conditionally registered; in CI container Docker socket is absent
          docker_count = len([name for name in TOOL_MANIFESTS if name in DOCKER_TOOL_NAMES])
          min_expected = full_count - docker_count
          msg = f'Tool count: {tc} (range [{min_expected}, {full_count}], full={full_count}, docker_missing={full_count - docker_count})'
          assert min_expected <= tc <= full_count, f'{msg} -- OUT OF RANGE'
          print(msg)
          "

      - name: Smoke test - REST API health + tools
        run: |
          docker run -d --rm --network host \
            -e MQTT_BROKER=localhost \
            -e MCP_UNSAFE_PUBLIC_ACCESS_CONFIRMED=1 \
            --name mcp-smoke local-home-devices-mcp:test
          sleep 5
          curl -fsS --retry 10 --retry-delay 2 \
            http://localhost:9100/health || exit 1
          curl -s http://localhost:9102/api/tools \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['success'] is True; assert d['total'] == d['tool_count'] and d['total'] > 0, d; print('REST API smoke test OK', d['total'], 'tools')"
          docker stop mcp-smoke
