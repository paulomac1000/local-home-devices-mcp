name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check . --ignore=E501

      - name: Ruff format check
        run: ruff format --check .

      - name: Run mypy
        run: pip install mypy types-requests && mypy tools/ --ignore-missing-imports

      - name: Run bandit
        run: pip install bandit && bandit -r tools/ -ll || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mosquitto:
        image: eclipse-mosquitto:latest
        ports:
          - 1883:1883
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          MQTT_BROKER: localhost
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq nmap
          pytest tests/integration/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: tasmota-openbk-mcp:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker run --rm tasmota-openbk-mcp:test python3 -c "from server import get_tool_count; tc = get_tool_count(); print('Tools registered=' + str(tc)); assert tc > 0, 'No tools registered'; print('Image verification OK')"

  smoke-test:
    runs-on: ubuntu-latest
    needs: docker-build
    services:
      mosquitto:
        image: eclipse-mosquitto:latest
        ports:
          - 1883:1883
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: tasmota-openbk-mcp:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — tool count (import)
        run: docker run --rm tasmota-openbk-mcp:test python3 -c "from server import get_tool_count; tc = get_tool_count(); assert tc == 14; print('Tool count OK=14')"

      - name: Smoke test — REST API health + tools
        run: |
          docker run -d --rm --network host \
            -e MQTT_BROKER=localhost \
            --name mcp-smoke tasmota-openbk-mcp:test
          sleep 5
          curl -fsS --retry 5 --retry-delay 2 http://localhost:9100/health || exit 1
          TOOLS=$(curl -s http://localhost:9102/api/tools | python3 -c "import sys,json; print(json.load(sys.stdin)['total'])")
          [ "$TOOLS" = "14" ] || (echo "FAIL: expected 14 tools, got $TOOLS" && exit 1)
          echo "REST API smoke test OK ($TOOLS tools)"
          docker stop mcp-smoke
