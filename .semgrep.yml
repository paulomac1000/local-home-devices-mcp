# Local Home Devices MCP — Semgrep project triage
#
# IoT devices on the local LAN (Tasmota, OpenBK) are HTTP-only —
# they do not support TLS. The request-with-http rule is a false
# positive for this project domain. The triage below accepts the
# pre-existing HTTP usage across the tools/ directory so Semgrep
# CI does not block merges on unfixable findings.
#
# Dockerfile: no USER is a known pre-existing condition.
# A non-root USER has been added in the current Dockerfile revision.
#
# New HTTP endpoints or new Docker images that introduce additional
# missing-USER violations will still be caught by Semgrep CI.

triage:
  - rule_id: request-with-http
    paths:
      - tools/
    reason: >
      IoT devices (Tasmota, OpenBK) on the local LAN are HTTP-only —
      they do not support TLS. All HTTP requests in tools/ are
      intentional device communication.

  - rule_id: missing-user
    paths:
      - Dockerfile
    reason: >
      Fixed in current revision — non-root USER directive added.
